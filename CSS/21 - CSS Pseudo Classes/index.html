<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Pseudo Classes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="box hover-box">Hover me</div>
  <div class="box active-box">Click me (active)</div>

  <input class="focus-input" type="text" placeholder="Focus me">

  <ul class="list-box">
    <li>First item</li>
    <li>Second item</li>
    <li>Third item</li>
    <li>Fourth item</li>
    <li>Fifth item</li>
    <li>Last item</li>
  </ul>

</body>
</html>
