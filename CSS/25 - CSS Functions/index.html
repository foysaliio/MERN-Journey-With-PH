<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Functions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="calc-box">calc(100% - 60px)</div>
  </div>

  <div class="container">
    <div class="min-box">min(80%, 300px)</div>
  </div>

  <div class="container">
    <div class="max-box">max(50%, 250px)</div>
  </div>

  <div class="container">
    <div class="clamp-box">clamp(150px, 50%, 400px)</div>
  </div>

  <p class="clamp-text">Responsive font-size using clamp(14px, 4vw, 28px)</p>

</body>
</html>
