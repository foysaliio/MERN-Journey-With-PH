<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Audio, Video & Iframe</title>
  </head>
  <body>
    <h1 align="center">HTML Audio, Video & Iframe</h1>

    <audio src="Source/cow.wav" controls></audio>

    <br />
    <br />

    <video src="Source/cow.mp4" controls height="400" width="700"></video>

    <br />
    <br />

    <iframe
      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14612.998890077206!2d90.497437!3d23.702774700000003!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sbd!4v1783079725563!5m2!1sen!2sbd"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
    <br />
    <br />
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/qP23O70ve7k?si=Ty4t6N9PK0f0Ip9V&amp;start=3"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
